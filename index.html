<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Trav - Tarp Order Form</title>
  <link rel="stylesheet" href="style.css">
  <script src="jspdf.umd.min.js"></script>
</head>
<body>

<div id="app">
  <!-- Tab Bar -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="form">New Order</button>
    <button class="tab" data-tab="history">History</button>
  </nav>

  <!-- Form Tab -->
  <div id="form-tab" class="tab-content active">
    <form id="order-form">
      <!-- Header -->
      <div class="form-header">
        <h1>Tarp Order Form</h1>
      </div>

      <!-- Top Info -->
      <div class="form-row">
        <div class="field grow">
          <label>Date</label>
          <input type="date" name="date" id="field-date">
        </div>
      </div>

      <div class="form-row">
        <div class="field grow">
          <label>Customer</label>
          <input type="text" name="customer" id="field-customer">
        </div>
        <div class="field">
          <label>Invoice</label>
          <input type="text" name="invoice" id="field-invoice">
        </div>
      </div>

      <div class="form-row">
        <div class="field grow">
          <label>Phone</label>
          <input type="tel" name="phone" id="field-phone">
        </div>
        <div class="field">
          <label>PO#</label>
          <input type="text" name="po" id="field-po">
        </div>
      </div>

      <div class="form-row">
        <div class="field grow">
          <label>Contact</label>
          <input type="text" name="contact" id="field-contact">
        </div>
      </div>

      <!-- Tarp Style -->
      <fieldset>
        <legend>Tarp Style</legend>
        <div class="radio-group">
          <label class="chip"><input type="radio" name="tarp_style" value="Semi"> Semi</label>
          <label class="chip"><input type="radio" name="tarp_style" value="10 Wheeler"> 10 Wheeler</label>
          <label class="chip"><input type="radio" name="tarp_style" value="Planter"> Planter</label>
          <label class="chip"><input type="radio" name="tarp_style" value="SRT"> SRT</label>
          <label class="chip other-chip">
            <input type="radio" name="tarp_style" value="Other"> Other
            <input type="text" name="tarp_style_other" class="inline-input" placeholder="specify">
          </label>
        </div>
      </fieldset>

      <!-- Tarp Color -->
      <fieldset>
        <legend>Tarp Color</legend>
        <div class="radio-group">
          <label class="chip"><input type="radio" name="tarp_color" value="Black"> Black</label>
          <label class="chip"><input type="radio" name="tarp_color" value="Red"> Red</label>
          <label class="chip"><input type="radio" name="tarp_color" value="White"> White</label>
          <label class="chip"><input type="radio" name="tarp_color" value="Blue"> Blue</label>
          <label class="chip"><input type="radio" name="tarp_color" value="Grey"> Grey</label>
          <label class="chip other-chip">
            <input type="radio" name="tarp_color" value="Other"> Other
            <input type="text" name="tarp_color_other" class="inline-input" placeholder="specify">
          </label>
        </div>
      </fieldset>

      <!-- Material & Dimensions -->
      <fieldset>
        <legend>Material &amp; Dimensions</legend>
        <div class="two-col">
          <div class="col">
            <label class="chip"><input type="radio" name="material" value="18oz"> 18oz</label>
            <label class="chip"><input type="radio" name="material" value="22oz"> 22oz</label>
            <label class="chip"><input type="radio" name="material" value="Shurloc"> Shurloc</label>
            <label class="chip"><input type="radio" name="material" value="Strap & Ratchet"> Strap &amp; Ratchet</label>
            <label class="chip"><input type="radio" name="material" value="PE"> PE</label>
            <label class="chip"><input type="radio" name="material" value="F1"> F1</label>
          </div>
          <div class="col">
            <div class="field">
              <label>Length</label>
              <input type="text" name="length" id="field-length">
            </div>
            <div class="field">
              <label>Width</label>
              <div class="radio-group">
                <label class="chip"><input type="radio" name="width" value="96&quot;"> 96"</label>
                <label class="chip"><input type="radio" name="width" value="102&quot;"> 102"</label>
              </div>
            </div>
            <div class="field">
              <label>Trailer Brand</label>
              <input type="text" name="trailer_brand" id="field-trailer-brand">
            </div>
          </div>
        </div>
      </fieldset>

      <!-- Extra Items -->
      <fieldset>
        <legend>Extra Items</legend>
        <div class="two-col">
          <div class="col">
            <label class="chip"><input type="checkbox" name="extras" value="Tarp Stop"> Tarp Stop</label>
            <label class="chip"><input type="checkbox" name="extras" value="End Cap"> End Cap</label>
            <label class="chip"><input type="checkbox" name="extras" value="Bows"> Bows</label>
            <label class="chip"><input type="checkbox" name="extras" value="Ratchet"> Ratchet</label>
            <label class="chip pipe-chip">
              <input type="checkbox" name="extras" value="1&quot; Pipe"> 1" Pipe
              <input type="text" name="pipe_1_length" class="inline-input" placeholder="Length">
            </label>
            <label class="chip pipe-chip">
              <input type="checkbox" name="extras" value="2&quot; Pipe"> 2" Pipe
              <input type="text" name="pipe_2_length" class="inline-input" placeholder="Length">
            </label>
            <label class="chip pipe-chip">
              <input type="checkbox" name="extras" value="3&quot; Pipe"> 3" Pipe
              <input type="text" name="pipe_3_length" class="inline-input" placeholder="Length">
            </label>
            <label class="chip"><input type="checkbox" name="extras" value="Handle"> Handle</label>
            <label class="chip"><input type="checkbox" name="extras" value="Ujoint"> Ujoint</label>
            <label class="chip"><input type="checkbox" name="extras" value="Splined End Shaft"> Splined End Shaft</label>
            <label class="chip"><input type="checkbox" name="extras" value="Bungee Return"> Bungee Return</label>
          </div>
          <div class="col">
            <label class="chip"><input type="checkbox" name="extras" value="Cable Return"> Cable Return</label>
            <label class="chip"><input type="checkbox" name="extras" value="4500 System"> 4500 System</label>
            <label class="chip"><input type="checkbox" name="extras" value="Latch Plate"> Latch Plate</label>
            <label class="chip"><input type="checkbox" name="extras" value="U-Clips"> U-Clips</label>
            <label class="chip"><input type="checkbox" name="extras" value="SRT Cable"> SRT Cable</label>
            <label class="chip"><input type="checkbox" name="extras" value="SRT Spool"> SRT Spool</label>
            <label class="chip"><input type="checkbox" name="extras" value="SRT Spring"> SRT Spring</label>
            <label class="chip pipe-chip">
              <input type="checkbox" name="extras" value="SRT Misc"> SRT Misc
              <input type="text" name="srt_misc" class="inline-input" placeholder="details">
            </label>
            <label class="chip pipe-chip">
              <input type="checkbox" name="extras" value="Misc"> Misc
              <input type="text" name="misc_detail" class="inline-input" placeholder="details">
            </label>
          </div>
        </div>
      </fieldset>

      <!-- Build Info -->
      <fieldset>
        <legend>Build Info</legend>
        <div class="form-row">
          <div class="field">
            <label># Pulls</label>
            <input type="text" name="pulls" id="field-pulls">
          </div>
          <div class="field">
            <label>Pull Length</label>
            <input type="text" name="pull_length" id="field-pull-length">
          </div>
        </div>
        <div class="field">
          <label>Bows</label>
          <textarea name="bows_info" id="field-bows-info" rows="3" placeholder="Bow details..."></textarea>
        </div>
      </fieldset>

      <!-- Notes -->
      <fieldset>
        <legend>Notes</legend>
        <textarea name="notes" id="field-notes" rows="3" placeholder="Additional notes..."></textarea>
      </fieldset>

      <!-- Actions -->
      <div class="actions">
        <button type="button" id="btn-save-pdf" class="btn btn-primary">Save PDF</button>
        <button type="button" id="btn-share" class="btn btn-drive">Share</button>
        <button type="reset" class="btn btn-secondary">Clear Form</button>
      </div>
    </form>
  </div>

  <!-- History Tab -->
  <div id="history-tab" class="tab-content">
    <div class="history-header">
      <h2>Order History</h2>
      <button id="btn-clear-history" class="btn btn-secondary btn-sm">Clear All</button>
    </div>
    <div id="history-list" class="history-list">
      <p class="empty-state">No orders yet.</p>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
